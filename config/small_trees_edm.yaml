defaults:
  - _self_
  - dataset: trees
  - diffusion: edm
  - method: expansion_oneshot

reduction:
  type: "depth"
  mode: "stochastic"
  cherry_p: 1.0 # imp now with new leaves tracking?
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 256
  lr: 5e-4
  num_steps: 200000 # ~200 epochs; considering 1 step = 1 batch
  max_num_workers: 0
  log_interval: 1000
  save_checkpoint: True
  resume: False # False, True (latest checkpoint), step number, or path to .pt file
  lr_scheduler: "cosine_annealing"              # Enable cosine annealing
  scheduler_T_max: ${training.num_steps}  # Optional: full cosine cycle length
  scheduler_eta_min: 1e-5          # Optional: minimum learning rate

validation:
  batch_size: 512
  interval: 1000
  first_step: 0
  per_graph_size: False
  enable_metrics: False
  enable_plots: True
  enable_dist_metrics: True
  enable_ks: True
  enable_morphometrics: True
  enable_light_joint: True
  enable_floor: True
  tmd_eval_filtration: radial_root
  tmd_eval_bins: 16
  tmd_pca_ncomp: 32
  dc_nearest_k: 5

testing: False # if True, only evaluate on test set

model:
  name: egnn
  num_layers: 6
  feats_dim: 64
  tmd_in_dim: 768
  tmd_hidden_dim: 32
  m_dim: 64
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 4
  offset_head_hidden: 128
  use_global_fallback_frames: False

ema:
  betas: [0.999]
  gamma: 1.0
  power: 0.8

name: small_trees_diffusion_edm
debugging: False
debugging_max_batches: 50
debugging_dir: "small_trees_debug"

wandb:
  logging: False
