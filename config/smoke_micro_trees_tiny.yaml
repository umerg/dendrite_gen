defaults:
  - _self_
  - dataset: micro_trees_tiny
  - method: expansion_oneshot

dataset:
  train_size: 100
  val_size: 5
  test_size: 5

reduction:
  mode: "stochastic"
  cherry_p: 1.0
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 4
  lr: 1e-5
  num_steps: 500000
  max_num_workers: 0
  log_interval: 10000
  save_checkpoint: False
  resume: False # if True, resume from last checkpoint, if number, resume from that step
  lr_scheduler: "cosine_annealing"              # Enable cosine annealing
  scheduler_T_max: ${training.num_steps}  # Optional: full cosine cycle length
  scheduler_eta_min: 1.0e-8         # Optional: minimum learning rate

validation:
  batch_size: 5
  interval: 10000
  first_step: 0
  per_graph_size: False
  enable_metrics: False
  enable_plots: True

testing: False # if True, only evaluate on test set

model:
  name: egnn_geometry_aware
  num_layers: 5
  feats_dim: 16
  m_dim: 16
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 4
  offset_head_hidden: 64
  use_global_fallback_frames: False

ema:
  betas: [1]
  gamma: 1.0
  power: 1.0

name: tiny_micro_trees_test
debugging: False
debugging_max_batches: 1
debugging_dir: "micro_trees_debug"

wandb:
  logging: False
