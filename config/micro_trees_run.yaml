defaults:
  - _self_
  - dataset: micro_trees
  - method: expansion_oneshot_augmented

reduction:
  type: "cherry"
  mode: "stochastic"
  cherry_p: 1.0
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 8192
  lr: 5e-3
  num_steps: 200 # ~200 epochs; considering 1 step = 1 batch
  max_num_workers: 0
  log_interval: 2
  save_checkpoint: True
  resume: False # False, True (latest checkpoint), step number, or path to .pt file
  lr_scheduler: "cosine_annealing"              # Enable cosine annealing
  scheduler_T_max: ${training.num_steps}  # Optional: full cosine cycle length
  scheduler_eta_min: 1.0e-6          # Optional: minimum learning rate

validation:
  batch_size: 10
  interval: 10
  first_step: 0
  per_graph_size: False
  enable_metrics: False
  enable_plots: True            # 3D multi-azimuth views (orbiting uhat) of gen + GT
  enable_dist_metrics: True     # Wasserstein-1 of gen-vs-GT stat distributions
  ged_enabled: True             # avg tree-edit distance (capped by node/pair count)
  ged_timeout: 5.0
  plot_angles: [[20, 30], [20, 120], [20, 210]]   # (elev, azim) around uhat
  enable_ks: True               # KS alongside W1 (continuous features)
  enable_morphometrics: True    # path/radial/contraction/order/strahler/asymmetry/sholl
  enable_light_joint: True      # morpho + Euclidean-TMD MMD/Density/Coverage every val
  enable_floor: True            # real-vs-real reference lines + headline excess
  tmd_eval_filtration: radial_root
  tmd_eval_bins: 16
  tmd_pca_ncomp: 32             # PCA dim for TMD persistence-image embedding (eval)
  dc_nearest_k: 5               # k for Density/Coverage

testing: False # if True, only evaluate on test set

model:
  name: egnn_multihead
  num_layers: 6
  feats_dim: 32
  m_dim: 32
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 4
  offset_head_hidden: 64
  use_global_fallback_frames: False

ema:
  betas: [1]
  gamma: 1.0
  power: 1.0

name: micro_trees_run_2
debugging: False
debugging_max_batches: 1
debugging_dir: "micro_trees_debug"

wandb:
  logging: False
