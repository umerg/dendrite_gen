defaults:
  - _self_
  - dataset: deterministic_synth
  - diffusion: flow_det10
  - method: expansion # expansion.yaml

# Zero-conditional-entropy probe run. Identical stack to the neuron flow10
# baseline (data-prediction, depth reduction, no EMA, y-axis SO(2)); the ONLY
# difference is the dataset. Decides H1 (data stochasticity) vs H2 (framework bug).

reduction:
  type: "depth"
  mode: "stochastic"
  cherry_p: 1.0
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 512
  lr: 5e-4
  optimizer: adam        # adam | adamw (adamw = decoupled weight decay)
  weight_decay: 0.0      # >0 only meaningful with adamw
  num_steps: 10000
  max_num_workers: 0
  log_interval: 250
  save_checkpoint: True
  resume: False
  lr_scheduler: "cosine_annealing"
  scheduler_T_max: ${training.num_steps}
  scheduler_eta_min: 1e-5
  grad_clip_norm: 1.0

validation:
  batch_size: 64
  interval: 250                 # dense checkpoint-vs-quality curve over the 10k run
  first_step: 0
  per_graph_size: False
  enable_metrics: False
  enable_plots: True            # 3D multi-azimuth views (orbiting uhat) of gen + GT
  enable_dist_metrics: True     # Wasserstein-1 / KS of gen-vs-GT stat distributions
  ged_enabled: False
  ged_timeout: 5.0
  plot_angles: [[20, 30], [20, 120], [20, 210]]
  enable_ks: True
  enable_morphometrics: True
  enable_light_joint: True
  enable_floor: True
  tmd_eval_filtration: radial_root
  tmd_eval_bins: 16
  tmd_pca_ncomp: 64
  dc_nearest_k: 5

testing: False

model:
  name: egnn
  num_layers: 6          # simple deterministic task: local features (run<=3, switches over 4
                         # ancestors, 1-hop ecc) + global attn for d_r. 6 layers keeps a
                         # receptive-field margin (switches needs ~4 hops) while ~2x faster than
                         # the neuron baseline's 12. If interior R^2 fails to reach ~1, escalate
                         # to model.num_layers=12 before concluding a framework bug.
  feats_dim: 128
  m_dim: 256
  tmd_in_dim: 0
  tmd_hidden_dim: 0
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 8
  offset_head_hidden: 256
  use_global_fallback_frames: False
  so2_axis: [0., 1., 0.] # y-axis growth/symmetry, matching neurons

ema:
  betas: [1]      # no EMA -- match the flow10 baseline
  gamma: 1.0
  power: 1.0

name: det_synth_flow10_zero_entropy_probe
debugging: False
debugging_max_batches: 50
debugging_dir: "det_synth_debug"

wandb:
  logging: True
