# Variant of neuron_dataset_run_3 with:
#   - AdamW (decoupled weight decay) instead of plain Adam, for training stability
#   - teacher-forced eval enabled alongside free-running (validation.eval_mode: both)
# Everything else is identical to neuron_dataset_run_3.yaml.
defaults:
  - _self_
  - dataset: neurons # neurons.yaml
  - diffusion: flow_v10 # basic.yaml
  - method: expansion # expansion.yaml

reduction:
  type: "depth"
  mode: "stochastic"
  cherry_p: 1.0
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 512 # can adjust based on GPU memory, but does make steps slower on increasing and hence there is a tradoff on updates per unit time
  lr: 5e-4
  optimizer: adam      # adam | adamw (adamw = decoupled weight decay)
  weight_decay: 0.01     # AdamW decoupled weight decay; 0.01 = torch default. Tune (0 == plain Adam).
  num_steps: 60000
  max_num_workers: 0
  log_interval: 100 # can make 5K as well
  save_checkpoint: True
  resume: False # False, True (latest checkpoint), step number, or path to .pt file
  lr_scheduler: "cosine_annealing"
  scheduler_T_max: ${training.num_steps}
  scheduler_eta_min: 1e-6
  grad_clip_norm: 1.0   # max global grad-norm; null disables clipping. Pre-clip norm is always logged as training/grad_norm

validation:
  batch_size: 64 # adjust according train/val split - currently only 50 samples in val set
  interval: 500 # can make 5k
  first_step: 0
  per_graph_size: False
  eval_mode: rollout               # rollout | teacher_forced | both. both = free-running metrics AND
                                # per-level TF eval each validation (expensive). Use teacher_forced
                                # to run ONLY the TF eval (skips free-running generation + its metrics/plots).
  tf_max_graphs: 64             # cap GT trees for TF eval (full ODE per reduction level per graph)
  tf_min_depth: 0               # restrict pooled TF metrics to leaves at tree depth >= this (2 drops root children)
  enable_metrics: False
  enable_plots: True            # 3D multi-azimuth views (orbiting uhat) of gen + GT
  enable_dist_metrics: True     # Wasserstein-1 of gen-vs-GT stat distributions
  ged_enabled: False             # avg tree-edit distance (capped by node/pair count)
  ged_timeout: 5.0
  plot_angles: [[20, 30], [20, 120], [20, 210]]   # (elev, azim) around uhat
  enable_ks: False               # KS alongside W1 (continuous features)
  enable_morphometrics: True    # path/radial/contraction/order/strahler/asymmetry/sholl
  enable_light_joint: True      # morpho + Euclidean-TMD MMD/Density/Coverage every val
  enable_floor: False            # real-vs-real reference lines + headline excess
  tmd_eval_filtration: radial_root
  tmd_eval_bins: 16
  tmd_pca_ncomp: 64             # N~2000: 256-d is fine; PCA mostly de-noises
  dc_nearest_k: 5               # k for Density/Coverage
  # Matched, TMD-conditioned pairwise fidelity: gen[i] vs its conditioning GT[i] (opt-in).
  # Off here because this run is unconditional (tmd_hidden_dim: 0); set True once you enable
  # TMD conditioning so the per-conditioning signal is meaningful.
  enable_pairwise_metrics: False
  tmd_cond_every: 5             # run every N-th validation (cost control); 1 = every validation
  tmd_cond_max_pairs: 64        # cap matched pairs (PD Wasserstein dominates cost)
  tmd_cond_pd_filtrations: [path, radial_root]  # per-pair persistence-diagram distance filtrations
  tmd_cond_wasserstein: True    # PD Wasserstein (persim)
  tmd_cond_bottleneck: False    # PD bottleneck (persim); off by default
  tmd_cond_normalize: minmax    # filtration normalization for the paired diagrams

testing: False # if True, only evaluate on test set

model:
  name: egnn
  num_layers: 16
  feats_dim: 256
  m_dim: 256
  tmd_hidden_dim: 0            # >0 enables TMD conditioning; tmd_in_dim is auto-derived (n_filtrations * tmd_bins**2)
  tmd_filtrations: [path, height, radial_root]   # radial_root = Euclidean-from-soma (axis-agnostic); path/height key off so2_axis (y for neurons)
  tmd_bins: 16                 # persistence-image grid per filtration
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 8
  offset_head_hidden: 256
  use_global_fallback_frames: False
  so2_axis: [0., 1., 0.] # z-axis for trees, y-axis for neurons
  # RBF edge-distance kernel (default OFF). Set rbf_k>0 to expand rho/du into Gaussian
  # channels instead of raw scalars. Ranges are in pos_scale_factor-normalized units.
  rbf_k: 0              # >0 = rbf_k Gaussian channels per distance (recommended 16); 0 = raw scalar
  rbf_gamma: 10.0       # Gaussian width (shared by rho & du)
  rbf_rho_max: 4.0      # in-plane radius span [0, rho_max]; neuron C_0 rho p99=3.1 (scale 1/45.1, axis y)
  rbf_du_max: 4.0       # axial span [-du_max, du_max]; neuron |du| p99=3.1

ema: # 0.999 EMA now that the update formula is fixed; warmup ramps and saturates at beta by ~step 1000 (gamma/power below)
  betas: [1, 0.99, 0.999]
  gamma: 1.0
  power: 0.8

name: flowv_neuron_unconditional_ema
debugging: False
debugging_max_batches: 50
debugging_dir: "neurons_debug"

wandb: # also working, can log in and use
  logging: True
