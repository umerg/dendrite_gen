defaults:
  - _self_
  - dataset: single_tree
  - method: expansion_oneshot

reduction:
  type: "cherry"
  mode: "stochastic"
  cherry_p: 1.0 # imp now with new leaves tracking?
  ensure_progress: True
  root: 0
  contract_root: False
  num_red_seqs: -1
  min_red_frac: 0.0
  max_red_frac: 0.5
  red_threshold: 0

training:
  batch_size: 4096
  lr: 5e-3
  num_steps: 2000 # ~200 epochs; considering 1 step = 1 batch
  max_num_workers: 0
  log_interval: 20
  save_checkpoint: True
  resume: False # if True, resume from last checkpoint, if number, resume from that step
  lr_scheduler: "cosine_annealing"              # Enable cosine annealing
  scheduler_T_max: ${training.num_steps}  # Optional: full cosine cycle length
  scheduler_eta_min: 1.0e-8          # Optional: minimum learning rate

validation:
  batch_size: 1
  interval: 50
  first_step: 0
  per_graph_size: False
  enable_metrics: False
  enable_plots: True

testing: False # if True, only evaluate on test set

model:
  name: egnn_simple
  num_layers: 6
  feats_dim: 32
  m_dim: 32
  dropout: 0.1
  norm_feats: True
  global_linear_attn_every: 2
  global_linear_attn_heads: 4
  global_linear_attn_dim_head: 16
  num_global_tokens: 4
  offset_head_hidden: 128
  use_global_fallback_frames: False

ema:
  betas: [1]
  gamma: 1.0
  power: 1.0

name: geo_method_single_tree
debugging: False
debugging_max_batches: 1
debugging_dir: "small_trees_debug"

wandb:
  logging: False
